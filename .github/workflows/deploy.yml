name: Deploy Code to GCP VM

on:
  push:
    branches: [ Test-main-Jon ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.SERVICE_ACCOUNT_KEY }}

      - name: Configure gcloud
        run: |
          gcloud config set project jon-backend
          gcloud config set compute/zone ${{ secrets.VM_ZONE }}

      - name: Start VM (optional)
        run: |
          gcloud compute instances start ${{ secrets.VM_NAME }} --zone ${{ secrets.VM_ZONE }}

      - name: Deploy code to VM using SSH
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "同步程式碼到部署目錄..."
            # 若尚未存在部署目錄，先建立之
            mkdir -p ~/deployment
            # 利用 rsync 同步所有程式碼到 VM（也可以改用 scp）
            rsync -avz --delete . ~/deployment/
            echo "執行 restart.sh..."
            cd ~/deployment
            chmod +x restart.sh
            ./restart.sh
