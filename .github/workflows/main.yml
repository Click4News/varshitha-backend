name: Manage GCE VM

on:
  push:
    branches:
      - main

jobs:
  start-vm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.SERVICE_ACCOUNT_KEY }}

      - name: Start GCE VM
        run: |
          gcloud compute instances start a-basic-interactive-instance \
            --zone=us-central1-f

  stop-vm:
    needs: start-vm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.SERVICE_ACCOUNT_KEY }}

      - name: Stop GCE VM
        run: |
          gcloud compute instances stop a-basic-interactive-instance \
            --zone=us-central1-f
