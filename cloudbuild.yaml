options:
  logging: CLOUD_LOGGING_ONLY
steps:
  # Step 0: 設定專案與區域
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: bash
    args:
      - '-c'
      - |
          gcloud config set project jon-backend
          gcloud config set compute/zone us-central1-f

  # Step 1: 將工作區複製到暫存資料夾，確保工作區不再變動
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: bash
    args:
      - '-c'
      - |
          echo "Copying /workspace to /tmp/source ..."
          cp -r /workspace /tmp/source

  # Step 2: 在暫存資料夾中打包（排除 .git），忽略「file changed」警告
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: bash
    args:
      - '-c'
      - |
          echo "Creating tarball from /tmp/source ..."
          tar --warning=no-file-changed --exclude='.git' -czf deployment.tar.gz -C /tmp/source .

  # Step 3: 傳送 tar 檔到 VM 的 ~/deployment 目錄
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - compute
      - scp
      - 'deployment.tar.gz'
      - 'watermelon0101@jonvm:~/deployment/deployment.tar.gz'
      - '--zone'
      - us-central1-f

  # Step 4: 在 VM 上解壓 tar 檔、刪除 tarball，並執行 restart.sh
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - compute
      - ssh
      - 'watermelon0101@jonvm'
      - '--zone'
      - us-central1-f
      - '--command'
      - |
          mkdir -p ~/deployment &&
          cd ~/deployment &&
          tar xzf deployment.tar.gz &&
          rm deployment.tar.gz &&
          chmod +x restart.sh &&
          ./restart.sh
