options:
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET

availableSecrets:
  secretManager:
    - versionName: "projects/$PROJECT_ID/secrets/MONGO_URI/versions/latest"
      env: "MONGO_URI"
    - versionName: "projects/$PROJECT_ID/secrets/AWS_REGION/versions/latest"
      env: "AWS_REGION"
    - versionName: "projects/$PROJECT_ID/secrets/AWS_ACCESS_KEY_ID/versions/latest"
      env: "AWS_ACCESS_KEY_ID"
    - versionName: "projects/$PROJECT_ID/secrets/AWS_SECRET_ACCESS_KEY/versions/latest"
      env: "AWS_SECRET_ACCESS_KEY"
    - versionName: "projects/$PROJECT_ID/secrets/QUEUE_NAME/versions/latest"
      env: "QUEUE_NAME"

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/news-app-service', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/news-app-service']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    secretEnv:
      - MONGO_URI
      - AWS_REGION
      - AWS_ACCESS_KEY_ID
      - AWS_SECRET_ACCESS_KEY
      - QUEUE_NAME
    args:
      - '-c'
      - >
        gcloud run deploy news-app-service
        --image gcr.io/$PROJECT_ID/news-app-service
        --region us-central1
        --platform managed
        --allow-unauthenticated
images:
  - 'gcr.io/$PROJECT_ID/news-app-service'
