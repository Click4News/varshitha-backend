options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # Step 0: 設定專案與區域
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: bash
    args:
      - '-c'
      - |
          gcloud config set project jon-backend
          gcloud config set compute/zone us-central1-f

  # Step 1: 複製 + 打包（排除 .git）避免 workspace 被改動
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: bash
    args:
      - '-c'
      - |
          echo "Copying and creating tarball..."
          mkdir -p /tmp/source
          cp -r /workspace/* /tmp/source/
          tar --warning=no-file-changed --exclude='.git' -czf deployment.tar.gz -C /tmp/source .

  # Step 2: 傳送 tar 檔到 VM 的 ~/deployment
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - compute
      - scp
      - 'deployment.tar.gz'
      - 'watermelon0101@jonvm:~/deployment/deployment.tar.gz'
      - '--zone'
      - us-central1-f

  # Step 3: 在 VM 解壓、執行 restart.sh
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - compute
      - ssh
      - 'watermelon0101@jonvm'
      - '--zone'
      - us-central1-f
      - '--command'
      - |
          mkdir -p ~/deployment &&
          cd ~/deployment &&
          tar xzf deployment.tar.gz &&
          rm deployment.tar.gz &&
          chmod +x restart.sh &&
          ./restart.sh
