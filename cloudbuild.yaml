options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # 1. 設定專案與區域
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: bash
    args:
      - '-c'
      - |
        gcloud config set project jon-backend
        gcloud config set compute/zone us-central1-f

  # 2. 直接複製 Cloud Build 的工作區 /workspace 到 VM 的 ~/deployment 目錄
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - compute
      - scp
      - '--recurse'
      - /workspace
      - 'watermelon0101@jonvm:~/deployment'
      - '--zone'
      - us-central1-f

  # 3. 在 VM 上進入複製過來的資料夾並執行 restart.sh
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - compute
      - ssh
      - 'watermelon0101@jonvm'
      - '--zone'
      - us-central1-f
      - '--command'
      - |
          cd ~/deployment && chmod +x restart.sh && ./restart.sh
