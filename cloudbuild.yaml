options:
  logging: CLOUD_LOGGING_ONLY
steps:
  # 1. 設定專案與區域
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: bash
    args:
      - '-c'
      - |
        gcloud config set project jon-backend
        gcloud config set compute/zone us-central1-f

  # 2. 打包整個 repository，但排除 .git 目錄
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: bash
    args:
      - '-c'
      - |
        tar --exclude='.git' -czf deployment.tar.gz -C /workspace .

  # 3. 傳送 tar 檔到 VM 的 ~/deployment 目錄
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - compute
      - scp
      - 'deployment.tar.gz'
      - 'watermelon0101@jonvm:~/deployment/deployment.tar.gz'
      - '--zone'
      - us-central1-f

  # 4. 在 VM 上解壓 tar 檔並執行 restart.sh
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - compute
      - ssh
      - 'watermelon0101@jonvm'
      - '--zone'
      - us-central1-f
      - '--command'
      - |
          mkdir -p ~/deployment &&
          cd ~/deployment &&
          tar xzf deployment.tar.gz &&
          rm deployment.tar.gz &&
          chmod +x restart.sh &&
          ./restart.sh
