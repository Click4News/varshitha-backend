options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # 1. 設定專案與區域
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: bash
    args:
      - '-c'
      - |
        gcloud config set project jon-backend
        gcloud config set compute/zone us-central1-f

  # 2. 直接使用 /workspace 作為來源，傳送所有檔案到 VM 上的 deployment 目錄
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - compute
      - scp
      - --recurse
      - /workspace
      - 'watermelon0101@jonvm:~/deployment'
      - --zone
      - us-central1-f

  # 3. 登入 VM，執行部署腳本（假設 restart.sh 位於 /workspace/restart.sh）
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - compute
      - ssh
      - 'watermelon0101@jonvm'
      - --zone
      - us-central1-f
      - --command
      - |
          cd ~/deployment/workspace && chmod +x restart.sh && ./restart.sh
