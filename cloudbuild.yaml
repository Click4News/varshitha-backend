options:
  logging: CLOUD_LOGGING_ONLY
steps:
  # Step 0: 設定專案與區域
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: bash
    args:
      - '-c'
      - |
          gcloud config set project jon-backend
          gcloud config set compute/zone us-central1-f

  # Step 1: 打包整個 repository（排除 .git），忽略 "file changed" 警告
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: bash
    args:
      - '-c'
      - |
          tar --warning=no-file-changed --exclude='.git' -czf deployment.tar.gz -C /workspace .

  # Step 2: 傳送 tar 檔到 VM 的 ~/deployment 目錄
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - compute
      - scp
      - 'deployment.tar.gz'
      - 'watermelon0101@jonvm:~/deployment/deployment.tar.gz'
      - '--zone'
      - us-central1-f

  # Step 3: 在 VM 上解壓 tar 檔、刪除 tarball，然後執行 restart.sh
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - compute
      - ssh
      - 'watermelon0101@jonvm'
      - '--zone'
      - us-central1-f
      - '--command'
      - |
          mkdir -p ~/deployment &&
          cd ~/deployment &&
          tar xzf deployment.tar.gz &&
          rm deployment.tar.gz &&
          chmod +x restart.sh &&
          ./restart.sh
