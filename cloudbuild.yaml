steps:
  # 設定 gcloud 的專案與區域
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud config set project jon-backend
        gcloud config set compute/zone us-central1-f

  # 將程式碼傳送到 VM 上的 ~/deployment 目錄
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'compute'
      - 'scp'
      - '--recurse'
      - '.'
      - 'watermelon0101@jonvm:~/deployment'
      - '--zone'
      - 'us-central1-f'

  # 在 VM 上執行部署指令：給予 restart.sh 執行權限並執行
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'compute'
      - 'ssh'
      - 'watermelon0101@jonvm'
      - '--zone'
      - 'us-central1-f'
      - '--command'
      - 'cd ~/deployment && chmod +x restart.sh && ./restart.sh'
