options:
  logging: CLOUD_LOGGING_ONLY

steps:
  # 1. 設定 gcloud 專案與區域
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud config set project jon-backend
        gcloud config set compute/zone us-central1-f

  # 2. 將 repository 壓縮成 tarball（忽略「file changed」警告）
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        tar --warning=no-file-changed -czf repo.tar.gz .

  # 3. 傳送 tarball 到 VM 的 deployment 目錄
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'compute'
      - 'scp'
      - 'repo.tar.gz'
      - 'watermelon0101@jonvm:~/deployment/repo.tar.gz'
      - '--zone'
      - 'us-central1-f'

  # 4. 在 VM 上解壓 tarball 並執行 restart.sh
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'compute'
      - 'ssh'
      - 'watermelon0101@jonvm'
      - '--zone'
      - 'us-central1-f'
      - '--command'
      - |
          mkdir -p ~/deployment &&
          cd ~/deployment &&
          tar xzf repo.tar.gz &&
          rm repo.tar.gz &&
          chmod +x restart.sh &&
          ./restart.sh
